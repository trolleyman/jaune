[package]
name = "jaune"
description = "A fast and lightweight TextMate grammar parser and tokenizer."
version = "0.1.0"
edition = "2024"
license = "MIT"
readme = "README.md"
keywords = ["textmate", "syntax", "highlighting", "tokenizer", "grammar"]
categories = ["parsing", "text-processing"]
# Only ship the crate sources and the generated grammar assets — never the (huge)
# `textmate-grammars-themes` submodule or the TS tooling. Regenerate assets with
# `bun run package-grammars` before publishing (see scripts/publish.ts).
include = [
    "/src",
    "/assets/grammars",
    "/Cargo.toml",
    "/README.md",
]

[dependencies]
bimap = "0.6.3"
# Tracks the unreleased `regexset_find_input` branch of fancy-regex#255
# (https://github.com/fancy-regex/fancy-regex/pull/255), the RegexSet/Oniguruma-drop-in
# work tracked in fancy-regex#162 (https://github.com/fancy-regex/fancy-regex/issues/162).
# jaune uses its `RegexInput` `\G`/anchoring model — which replaces the old manual `\G`
# shim — plus `oniguruma_mode`. (The branch's `RegexSet` multi-pattern scanner was
# prototyped but not adopted; see PLAN.md issue #2.) The PR is still in review with known
# rough edges (Unicode word-boundary panic — now with a fallback, quantifier divergences,
# and `\G`-in-lookbehind optimisation bugs; see PR #255's review thread), so this is
# expected to move; re-pin to a published release once the work lands.
fancy-regex = { git = "https://github.com/fancy-regex/fancy-regex", branch = "regexset_find_input" }
plist = "1.7"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.148"
static_assertions = "1.1.0"
thiserror = "2.0.17"

[features]
# == BEGIN GENERATED FEATURES ==
# Internal marker enabled by every grammar feature; gates the bundled module.
_bundled = []

# One feature per grammar. Enabling it also enables its embedded grammars so
# that languages-in-languages (e.g. CSS in HTML) tokenize correctly.
